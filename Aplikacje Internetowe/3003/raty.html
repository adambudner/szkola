<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursy komputerowe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="./klawiatura.jpg" alt="kursy komputerowe">
    </header>
    <nav>
        <a href="./index.html">Strona główna</a>
        <a href="./raty.html">Kosz rat</a>
        <a href="https://moje-szkolenia.pl">Nasz partner</a>
    </nav>
    <main>
        <h3>Oblicz miesięczną ratę</h3>
        <form>
            <label for="react"><input type="checkbox" id="react" class="kontrolki">Kust React js</label>
            <label for="js"><input type="checkbox" id="js" class="kontrolki">Kurs JavaScript</label>
            <label for="raty"><input type="number" id="raty" class="kontrolki">Liczba rat</label>
        
            <select id="miasta" class="kontrolki">
                <option value="Warszawa">Warszawa</option>
                <option value="Katowice">Katowice</option>
                <option value="Gdańsk">Gdańsk</option>    
            </select>
            <button id="oblicz">Oblicz</button>
        </form>
        <p id="wynik">tutaj wynik skryptu</p>
    </main>
    <footer>Autor strony: 1234567890</footer>
    <script>
        const btn    = document.querySelector("#oblicz");

        btn.addEventListener('click', (e)=>{

            const react  = document.querySelector("#react").checked;
            const js     = document.querySelector("#js").checked;
            const raty   = document.querySelector("#raty").value;
            const miasta = document.querySelector("#miasta").value;

            e.preventDefault();
            const wynik = document.querySelector("#wynik");
            wynik.textContent = 
            react + "\n" +
            js + "\n" + 
            raty + "\n" +
            miasta + "\n";

            let price = 0;
            if (react) price += 5000;
            if (js) price += 3000;


            wynik.textContent = `Kurs odbędzie się w ${miasta}.
            Koszt całkowity: ${price} zł
            Płącisz ${raty} rat(y) po ${price/raty}`
        });
        
    </script>
</body>
</html>
